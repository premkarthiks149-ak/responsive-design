<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Digital Clock</title>\n    <style>\n        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }\n        .clock { font-size: 2em; margin-bottom: 20px; }\n    </style>\n</head>\n<body>\n    <div class="clock" id="clock"></div>\n    <script>\n        function updateClock() {\n            const timeZones = [\n                { name: 'UTC', offset: 0 },\n                { name: 'ET', offset: -4 },\n                { name: 'CT', offset: -5 },\n                { name: 'MT', offset: -6 },\n                { name: 'PT', offset: -7 }\n            ];\n            const now = new Date();\n            let clockHTML = '';\n            timeZones.forEach(zone => {\n                const localTime = new Date(now.getTime() + zone.offset * 3600000);\n                clockHTML += `<div>${zone.name}: ${localTime.toISOString().substring(0, 19).replace('T', ' ')}</div>`;\n            });\n            document.getElementById('clock').innerHTML = clockHTML;\n        }\n        setInterval(updateClock, 1000);\n        updateClock();\n    <\/script>\n</body>\n</html>
