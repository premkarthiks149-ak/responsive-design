<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Responsive Design</title>
    <style>
        /* Improved CSS practices */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        header {
            background-color: #4CAF50;
            color: white;
            padding: 15px;
            text-align: center;
        }
        main {
            padding: 20px;
        }
        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 10px 0;
            position: relative;
            bottom: 0;
            width: 100%;
        }
        /* Added breakpoints */
        @media (max-width: 768px) {
            header, footer {
                padding: 10px;
            }
            main {
                padding: 10px;
            }
        }
        @media (max-width: 480px) {
            header, footer {
                font-size: 14px;
            }
        }
        /* Added animations */
        .fade-in {
            animation: fadeIn 1s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        /* Improved accessibility with better color contrast */
        a {
            color: #FFD700;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
            color: #FF6347;
        }
    </style>
</head>
<body>
    <header class="fade-in">
        <h1>Welcome to My Responsive Design</h1>
    </header>
    <main>
        <p>This is a simple responsive web page with improved design practices.</p>
    </main>
    <footer>
        <p>&copy; 2026 Your Name</p>
    </footer>
</body>
</html>
