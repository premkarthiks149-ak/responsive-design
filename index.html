<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Design</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --secondary-color: #50e3c2;
            --background-color: #ffffff;
            --text-color: #333333;
            --dark-background: #1a1a1a;
            --dark-text: #f5f5f5;
            --font-family: 'Arial', sans-serif;
        }

        body {
            font-family: var(--font-family);
            transition: background-color 0.5s, color 0.5s;
        }

        header {
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            color: var(--dark-text);
            padding: 20px;
            text-align: center;
        }

        .service-card {
            background: #f5f5f5;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin: 10px;
            padding: 15px;
            transition: transform 0.3s;
        }

        .service-card:hover {
            transform: translateY(-5px);
        }

        @media screen and (max-width: 360px) {
            body {
                font-size: 12px;
            }
        }

        @media screen and (min-width: 361px) and (max-width: 576px) {
            body {
                font-size: 14px;
            }
        }

        @media screen and (min-width: 577px) and (max-width: 768px) {
            body {
                font-size: 16px;
            }
        }

        @media screen and (min-width: 769px) and (max-width: 1024px) {
            body {
                font-size: 18px;
            }
        }

        @media screen and (min-width: 1025px) and (max-width: 1440px) {
            body {
                font-size: 20px;
            }
        }

        @media screen and (min-width: 1441px) {
            body {
                font-size: 22px;
            }
        }

        .dark-mode {
            background-color: var(--dark-background);
            color: var(--dark-text);
        }
    </style>
</head>
<body>
    <header>
        <h1>Professional Responsive Design</h1>
    </header>
    <main>
        <section>
            <div class="service-card">Service 1</div>
            <div class="service-card">Service 2</div>
            <div class="service-card">Service 3</div>
            <div class="service-card">Service 4</div>
            <div class="service-card">Service 5</div>
            <div class="service-card">Service 6</div>
        </section>
    </main>
    <script>
        // Toggle dark mode
        const toggleDarkMode = () => {
            document.body.classList.toggle('dark-mode');
        };
        document.addEventListener('keydown', (event) => {
            if (event.key === 'd') {
                toggleDarkMode();
            }
        });
    </script>
</body>
</html>
